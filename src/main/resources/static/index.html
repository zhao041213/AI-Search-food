<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>智能菜谱 Demo</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #1f2933;
            --muted: #5b6673;
            --line: #d8dee6;
            --primary: #23735f;
            --primary-dark: #155948;
            --accent: #b9502a;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        header {
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        .shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 64px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .status {
            color: var(--muted);
            font-size: 14px;
            white-space: nowrap;
        }

        main {
            padding: 24px 0 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        section {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            padding: 18px;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 17px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font: inherit;
            line-height: 1.5;
            outline: none;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(35, 115, 95, 0.12);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 0 0 auto;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            min-height: 42px;
            padding: 0 18px;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.64;
        }

        .result {
            margin-top: 16px;
            display: grid;
            gap: 12px;
        }

        .recipe {
            border-left: 4px solid var(--accent);
            background: #fff8f4;
            padding: 12px 14px;
        }

        .recipe h3 {
            margin: 0 0 8px;
            font-size: 16px;
        }

        .recipe p,
        .recipe ol {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .recipe ol {
            padding-left: 20px;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            border-left: 4px solid var(--primary);
            background: #f1faf7;
            padding: 14px;
            color: var(--text);
            line-height: 1.7;
            font-family: inherit;
        }

        .error {
            border-left: 4px solid var(--danger);
            background: #fff3f1;
            color: var(--danger);
            padding: 12px 14px;
        }

        @media (max-width: 760px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 0;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .row {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="shell topbar">
        <h1>智能菜谱 Demo</h1>
        <div class="status">Spring Boot + DeepSeek</div>
    </div>
</header>

<main class="shell">
    <div class="grid">
        <section>
            <h2>菜谱搜索</h2>
            <label for="keyword">关键词</label>
            <div class="row">
                <input id="keyword" type="search" placeholder="例如：鸡蛋、焯水、牛肉">
                <button id="searchBtn" type="button">搜索</button>
            </div>
            <div id="searchResult" class="result"></div>
        </section>

        <section>
            <h2>AI 生成菜谱</h2>
            <label for="ingredients">食材</label>
            <textarea id="ingredients" placeholder="例如：鸡蛋、番茄、青椒"></textarea>
            <div class="row" style="margin-top: 10px;">
                <button id="generateBtn" type="button">生成</button>
            </div>
            <div id="generateResult" class="result"></div>
        </section>
    </div>
</main>

<script>
    const keywordInput = document.querySelector("#keyword");
    const ingredientsInput = document.querySelector("#ingredients");
    const searchButton = document.querySelector("#searchBtn");
    const generateButton = document.querySelector("#generateBtn");
    const searchResult = document.querySelector("#searchResult");
    const generateResult = document.querySelector("#generateResult");

    searchButton.addEventListener("click", searchRecipes);
    generateButton.addEventListener("click", generateRecipe);
    keywordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            searchRecipes();
        }
    });

    async function searchRecipes() {
        searchButton.disabled = true;
        searchResult.innerHTML = "";

        try {
            const keyword = encodeURIComponent(keywordInput.value.trim());
            const response = await fetch(`/api/recipes/search?keyword=${keyword}`);
            const recipes = await response.json();

            if (!recipes.length) {
                searchResult.innerHTML = `<div class="error">没有匹配的菜谱</div>`;
                return;
            }

            searchResult.innerHTML = recipes.map(recipe => `
                <article class="recipe">
                    <h3>${escapeHtml(recipe.name)}</h3>
                    <p>食材：${recipe.ingredients.map(escapeHtml).join("、")}</p>
                    <ol>${recipe.steps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}</ol>
                </article>
            `).join("");
        } catch (error) {
            searchResult.innerHTML = `<div class="error">搜索失败：${escapeHtml(error.message)}</div>`;
        } finally {
            searchButton.disabled = false;
        }
    }

    async function generateRecipe() {
        generateButton.disabled = true;
        generateResult.innerHTML = "";

        try {
            const response = await fetch("/api/recipes/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ingredients: ingredientsInput.value})
            });
            const data = await response.json();

            if (!response.ok) {
                generateResult.innerHTML = `<div class="error">${escapeHtml(data.error || "生成失败")}</div>`;
                return;
            }

            generateResult.innerHTML = `<pre>${escapeHtml(data.content)}</pre>`;
        } catch (error) {
            generateResult.innerHTML = `<div class="error">生成失败：${escapeHtml(error.message)}</div>`;
        } finally {
            generateButton.disabled = false;
        }
    }

    function escapeHtml(value) {
        return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
    }

    searchRecipes();
</script>
</body>
</html>
